<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furnace Blueprint</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 2rem; border-radius: 12px; border: 1px solid #334155; }
        h1 { color: #fbbf24; display: flex; align-items: center; }
        .icon { margin-right: 15px; }
        .back { margin-top: 2rem; display: inline-block; color: #94a3b8; text-decoration: none; font-weight: bold; }
        .back:hover { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fa-solid fa-fire-burner icon"></i> Furnace</h1>
        <h3>Materials Required</h3>
        <ul>
            <li>8x Cobblestone (any stone type)</li>
        </ul>
        <h3>Crafting Steps</h3>
        <ol>
            <li>Open the crafting table (3x3 grid).</li>
            <li>Fill all cells except the center with cobblestone.</li>
            <li>Leave the middle cell empty.</li>
            <li>Drag the furnace into your inventory.</li>
        </ol>
        <a href="index.html" class="back">← Back to Database</a>
    </div>
</body>
</html>
