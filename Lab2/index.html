<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Recipes | Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #fbbf24;
            --text: #f8fafc;
            --border: #334155;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; }
        header { text-align: center; margin-bottom: 3rem; }
        h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 0.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; list-style: none; padding: 0; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; transition: 0.3s; text-align: center; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card a { display: block; padding: 2rem; color: var(--text); text-decoration: none; font-weight: bold; }
        .card i { display: block; font-size: 2.5rem; margin-bottom: 1rem; color: var(--accent); }
        .basics { background: var(--card); padding: 1.5rem; border-radius: 12px; margin-top: 3rem; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-cubes"></i> Crafting Guide</h1>
            <p>Official blueprints for survival equipment.</p>
        </header>

        <ul class="grid">
            <li class="card">
                <a href="pickaxe.html">
                    <i class="fa-solid fa-hammer"></i>
                    Wooden Pickaxe
                </a>
            </li>
            <li class="card">
                <a href="sword.html">
                    <i class="fa-solid fa-khanda"></i>
                    Iron Sword
                </a>
            </li>
            <li class="card">
                <a href="furnace.html">
                    <i class="fa-solid fa-fire-burner"></i>
                    Furnace
                </a>
            </li>
        </ul>

        <div class="basics">
            <h2><i class="fa-solid fa-book"></i> Standard Protocol</h2>
            <ol>
                <li>Open a Crafting Table.</li>
                <li>Place items in the correct pattern.</li>
                <li>Transfer the result to your inventory.</li>
            </ol>
        </div>
    </div>
</body>
</html>
